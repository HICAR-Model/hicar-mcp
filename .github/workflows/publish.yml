name: publish

# Publishes to PyPI and attaches a .dxt bundle when a GitHub release is made.
on:
  release:
    types: [published]

permissions:
  contents: write       # upload release assets
  id-token: write       # PyPI trusted publishing

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify versions match the release tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PYVER=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          SJVER=$(python -c "import json;print(json.load(open('server.json'))['version'])")
          echo "release tag=$TAG  pyproject=$PYVER  server.json=$SJVER"
          test "$TAG" = "$PYVER" || { echo "::error::release tag ($TAG) != pyproject version ($PYVER)"; exit 1; }
          test "$TAG" = "$SJVER" || { echo "::error::release tag ($TAG) != server.json version ($SJVER)"; exit 1; }

      - name: Guard against shipping an empty knowledge bundle
        run: |
          test -f src/hicar_mcp/data/schema.json || { echo "missing bundled artifacts"; exit 1; }

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Build .dxt Desktop Extension
        run: |
          npx --yes @anthropic-ai/dxt pack . dist/hicar-mcp.dxt || \
            echo "dxt pack failed (non-fatal); see manifest.json"

      - name: Attach .dxt to the release
        if: ${{ hashFiles('dist/hicar-mcp.dxt') != '' }}
        uses: softprops/action-gh-release@v2
        with:
          files: dist/hicar-mcp.dxt

  # After publishing, the maintainer runs `mcp-publisher` (or the registry CI
  # action) against server.json to update the official MCP Registry entry.
